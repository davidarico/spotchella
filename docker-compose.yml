# Optional local PostgreSQL (Spotchella defaults to DATABASE_URL in .env)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotchella
      POSTGRES_PASSWORD: spotchella
      POSTGRES_DB: spotchella
    ports:
      - "5432:5432"
    volumes:
      - spotchella_pgdata:/var/lib/postgresql/data

volumes:
  spotchella_pgdata:
